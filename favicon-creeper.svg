<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Dark room background -->
  <rect width="32" height="32" fill="#050508"/>

  <!-- Creeper face base — almost invisible in the dark -->
  <rect x="2" y="2" width="28" height="28" fill="#0d1a0d"/>

  <!-- LEFT EYE — glowing green -->
  <rect x="5" y="7" width="8" height="7" fill="#4ade80"/>
  <!-- eye glow bloom -->
  <rect x="4" y="6" width="10" height="9" fill="#4ade80" opacity="0.15"/>

  <!-- RIGHT EYE — glowing green -->
  <rect x="19" y="7" width="8" height="7" fill="#4ade80"/>
  <!-- eye glow bloom -->
  <rect x="18" y="6" width="10" height="9" fill="#4ade80" opacity="0.15"/>

  <!-- MOUTH — exact creeper shape, glowing -->
  <!-- center top bar -->
  <rect x="13" y="17" width="6" height="3" fill="#4ade80"/>
  <!-- left drop -->
  <rect x="7" y="20" width="6" height="3" fill="#4ade80"/>
  <!-- right drop -->
  <rect x="19" y="20" width="6" height="3" fill="#4ade80"/>
  <!-- left bottom -->
  <rect x="7" y="23" width="6" height="3" fill="#4ade80"/>
  <!-- right bottom -->
  <rect x="19" y="23" width="6" height="3" fill="#4ade80"/>

  <!-- mouth glow bloom -->
  <rect x="6" y="16" width="20" height="12" fill="#4ade80" opacity="0.08"/>

  <!-- Subtle green tint on face from glow -->
  <rect x="2" y="2" width="28" height="28" fill="#4ade80" opacity="0.03"/>
</svg>
