<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MC Server Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* =============================================
       🔧  
       ============================================= */

    :root {
      --green: #4ade80;
      --green-dim: #166534;
      --green-glow: rgba(74, 222, 128, 0.35);
      --dirt: #92400e;
      --stone: #1c1917;
      --stone2: #292524;
      --stone3: #3d3836;
      --text: #e7e5e4;
      --text-dim: #a8a29e;
      --red: #f87171;
      --yellow: #fbbf24;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--stone);
      color: var(--text);
      font-family: 'VT323', monospace;
      font-size: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Pixel grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(74,222,128,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,222,128,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    /* Floating pixel particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--green);
      opacity: 0;
      animation: floatUp linear infinite;
      image-rendering: pixelated;
    }

    @keyframes floatUp {
      0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.2; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* ---- Main card ---- */
    .card {
      position: relative;
      z-index: 1;
      background: var(--stone2);
      border: 3px solid var(--stone3);
      box-shadow:
        inset 2px 2px 0 rgba(255,255,255,0.05),
        inset -2px -2px 0 rgba(0,0,0,0.3),
        0 0 40px var(--green-glow),
        0 20px 60px rgba(0,0,0,0.6);
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 420px;
      border-radius: 4px;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 12px var(--green-glow));
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 8px var(--green-glow)); }
      50%       { filter: drop-shadow(0 0 22px rgba(74,222,128,0.6)); }
    }
    .logo h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      color: var(--green);
      letter-spacing: 1px;
      line-height: 1.6;
      text-shadow: 0 0 20px var(--green-glow);
    }
    .logo p {
      color: var(--text-dim);
      font-size: 16px;
      margin-top: 6px;
    }

    /* ---- Tabs ---- */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      background: var(--stone);
      padding: 4px;
      border-radius: 3px;
    }
    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      border-radius: 2px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--text-dim);
      transition: all 0.15s;
      border: 2px solid transparent;
    }
    .tab.active {
      background: var(--stone2);
      color: var(--green);
      border-color: var(--green-dim);
      text-shadow: 0 0 10px var(--green-glow);
    }
    .tab:hover:not(.active) {
      color: var(--text);
      background: var(--stone3);
    }

    /* ---- Form ---- */
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--text-dim);
      margin-bottom: 7px;
      letter-spacing: 1px;
    }
    input {
      width: 100%;
      background: var(--stone);
      border: 2px solid var(--stone3);
      color: var(--text);
      font-family: 'VT323', monospace;
      font-size: 20px;
      padding: 10px 12px;
      border-radius: 3px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--green-dim);
      box-shadow: 0 0 0 3px var(--green-glow);
    }
    input::placeholder { color: var(--stone3); }

    /* ---- Button ---- */
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--green-dim);
      color: var(--green);
      border: 2px solid var(--green);
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      cursor: pointer;
      border-radius: 3px;
      letter-spacing: 1px;
      margin-top: 8px;
      transition: all 0.15s;
      text-shadow: 0 0 10px var(--green-glow);
      box-shadow: 0 0 15px var(--green-glow);
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(74,222,128,0.15), transparent);
      transition: left 0.4s;
    }
    .btn:hover::before { left: 100%; }
    .btn:hover {
      background: #14532d;
      box-shadow: 0 0 25px var(--green-glow);
      transform: translateY(-1px);
    }
    .btn:active { transform: translateY(1px); }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ---- Alert messages ---- */
    .alert {
      padding: 12px 14px;
      border-radius: 3px;
      font-size: 16px;
      margin-bottom: 16px;
      border: 2px solid;
      display: none;
    }
    .alert.show { display: block; }
    .alert-error   { background: rgba(248,113,113,0.1); border-color: var(--red);    color: var(--red); }
    .alert-success { background: rgba(74,222,128,0.1);  border-color: var(--green);  color: var(--green); }
    .alert-warn    { background: rgba(251,191,36,0.1);  border-color: var(--yellow); color: var(--yellow); }

    /* ---- Screens ---- */
    .screen { display: none; }
    .screen.active { display: block; }

    /* Pending screen */
    .pending-box {
      text-align: center;
      padding: 20px 0;
    }
    .pending-icon {
      font-size: 56px;
      display: block;
      margin-bottom: 16px;
      animation: spin 4s linear infinite;
    }
    @keyframes spin {
      0%   { transform: rotate(0deg); }
      25%  { transform: rotate(90deg); }
      50%  { transform: rotate(180deg); }
      75%  { transform: rotate(270deg); }
      100% { transform: rotate(360deg); }
    }
    .pending-box h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: var(--yellow);
      margin-bottom: 12px;
      line-height: 1.7;
    }
    .pending-box p {
      color: var(--text-dim);
      font-size: 18px;
      line-height: 1.5;
    }

    /* Approved / dashboard screen */
    .dashboard {
      text-align: center;
    }
    .dashboard h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: var(--green);
      margin-bottom: 8px;
      line-height: 1.7;
      text-shadow: 0 0 15px var(--green-glow);
    }
    .dashboard p {
      color: var(--text-dim);
      font-size: 18px;
      margin-bottom: 24px;
    }
    .server-status {
      background: var(--stone);
      border: 2px solid var(--stone3);
      border-radius: 3px;
      padding: 16px;
      margin-bottom: 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--stone3);
    }
    .status-row:last-child { border-bottom: none; }
    .status-label { color: var(--text-dim); }
    .status-val   { color: var(--text); }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .dot-off { background: var(--red); }
    .dot-on  { background: var(--green); box-shadow: 0 0 8px var(--green); }

    .btn-start {
      background: #14532d;
      color: var(--green);
      border-color: var(--green);
    }
    .btn-danger {
      background: #7f1d1d;
      color: var(--red);
      border: 2px solid var(--red);
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      cursor: pointer;
      border-radius: 3px;
      padding: 10px;
      width: 100%;
      margin-top: 10px;
      transition: all 0.15s;
    }
    .btn-danger:hover { background: #991b1b; transform: translateY(-1px); }

    .logout-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: var(--text-dim);
      font-size: 14px;
      cursor: pointer;
      text-decoration: underline;
    }
    .logout-link:hover { color: var(--red); }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid var(--green-dim);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: rotate 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="card">
  <div class="logo">
    <span class="logo-icon">⛏️</span>
    <h1>Low Cortisol Gaming<br>PORTAL</h1>
    <p>V.I.P Only</p>
  </div>

  <!-- AUTH SCREEN -->
  <div class="screen active" id="screen-auth">
    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Giriş yap</div>
      <div class="tab"        id="tab-signup" onclick="switchTab('signup')">Kayıt Ol</div>
    </div>

    <div class="alert" id="auth-alert"></div>

    <!-- Login form -->
    <div id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn btn-start" id="btn-login" onclick="doLogin()">▶ Giriş Yap</button>
    </div>

    <!-- Signup form -->
    <div id="form-signup" style="display:none">
      <div class="form-group">
        <label>Minecraft Kullanıcı Adı</label>
        <input type="text" id="signup-username" placeholder="Steve" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="signup-password" placeholder="(Min 8 karakter Aa!$%)" />
      </div>
      <button class="btn btn-start" id="btn-signup" onclick="doSignup()">⚡ Kayıt Ol</button>
    </div>
  </div>

  <!-- PENDING SCREEN -->
  <div class="screen" id="screen-pending">
    <div class="pending-box">
      <span class="pending-icon">⏳</span>
      <h2>Onay<br>Bekliyor</h2>
      <p>Kayıtınız verildi.<br><br>
         Admin yakında sizi içeri alıcaktır, İyİ oyunlar!</p>
    </div>
    <span class="logout-link" onclick="doLogout()">← Çıkış Yap</span>
  </div>

  <!-- APPROVED / DASHBOARD SCREEN -->
  <div class="screen" id="screen-dashboard">
    <div class="dashboard">
      <h2>✅ Onay<br>Verildi</h2>
      <p id="welcome-msg">Hoşgeldin!</p>

      <div class="server-status">
        <div class="status-row">
          <span class="status-label">STATUS</span>
          <span class="status-val"><span class="dot dot-off" id="status-dot"></span><span id="status-text">OFFLINE</span></span>
        </div>
        <div class="status-row">
          <span class="status-label">SERVER IP</span>
          <span class="status-val" id="server-ip">—</span>
        </div>
        <div class="status-row">
          <span class="status-label">VERSION</span>
          <span class="status-val">1.21.x</span>
        </div>
      </div>

      <!-- This button will be wired up in Phase 3 -->
      <button class="btn btn-start" onclick="alert('⚒️ Server start feature coming soon! (Phase 3)')">
        ▶ SUNUCUYU BAŞLAT
      </button>
    </div>
    <span class="logout-link" onclick="doLogout()">← Sign out</span>
  </div>

</div>

<script>
  // ============================================================
  // 🔧 
  // ============================================================
  const SUPABASE_URL  = 'https://wgxmvlvfchbfgdfqwqog.supabase.co';   
  const SUPABASE_ANON = 'sb_publishable_xsEvj7SkmvIvuNky8TWIpg_Gdovm8Ju';                  

  // ============================================================
  // 🔧 
  // ============================================================
  const TABLE_PENDING  = 'bekleyen';   // bekleyen mailler
  const TABLE_APPROVED = 'onay';  // onaylanmıs mailler

  // ---- Init Supabase ----
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  // ---- Particle effect ----
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay    = (Math.random() * 8) + 's';
    p.style.width = p.style.height = (4 + Math.random() * 6) + 'px';
    p.style.opacity = Math.random() * 0.5;
    container.appendChild(p);
  }

  // ---- Tab switching ----
  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active',  tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('form-login').style.display  = tab === 'login'  ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
    hideAlert();
  }

  // ---- Alert helpers ----
  function showAlert(msg, type = 'error') {
    const el = document.getElementById('auth-alert');
    el.textContent = msg;
    el.className = `alert show alert-${type}`;
  }
  function hideAlert() {
    const el = document.getElementById('auth-alert');
    el.className = 'alert';
  }

  // ---- Show a screen ----
  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
  }

  // ---- Check approval status after login ----
  async function checkUserStatus(user) {
    // Is this user in the approved table?
    const { data: approved } = await sb
      .from(TABLE_APPROVED)
      .select('*')
      .eq('email', user.email)
      .maybeSingle();

    if (approved) {
      document.getElementById('welcome-msg').textContent =
        `Welcome, ${approved.username || user.email}!`;
      document.getElementById('server-ip').textContent =
        approved.server_ip || 'Ask admin';
      showScreen('dashboard');
      return;
    }

    // Not approved yet  add to pending if not already there
    const { data: pending } = await sb
      .from(TABLE_PENDING)
      .select('*')
      .eq('email', user.email)
      .maybeSingle();

    if (!pending) {
      await sb.from(TABLE_PENDING).insert({
        email: user.email,
        username: user.user_metadata?.username || '',
        requested_at: new Date().toISOString()
      });
    }

    showScreen('pending');
  }

  // ---- Login ----
  async function doLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) return showAlert('Fill in all fields.');

    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>LOGGING IN...';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    btn.disabled = false;
    btn.innerHTML = '▶ LOGIN';

    if (error) return showAlert(error.message);
    await checkUserStatus(data.user);
  }

  // ---- Sign up ----
  async function doSignup() {
    const username = document.getElementById('signup-username').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;

    if (!username || !email || !password)
      return showAlert('Bütün alanları doldurun.');
    if (password.length < 6)
      return showAlert('Password must be at least 6 characters.');

    const btn = document.getElementById('btn-signup');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>SENDING REQUEST...';

    const { data, error } = await sb.auth.signUp({
      email, password,
      options: { data: { username } }
    });

    btn.disabled = false;
    btn.innerHTML = '⚡ REQUEST ACCESS';

    if (error) return showAlert(error.message);

    // Insert into pending table immediately
    await sb.from(TABLE_PENDING).insert({
      email,
      username,
      requested_at: new Date().toISOString()
    });

    showAlert('Account created! Check your email to confirm, then log in.', 'success');
    setTimeout(() => switchTab('login'), 3000);
  }

  // ---- Logout ----
  async function doLogout() {
    await sb.auth.signOut();
    showScreen('auth');
  }

  // ---- Auto-restore session on page load ----
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) {
      await checkUserStatus(session.user);
    }
  })();
</script>
</body>
</html>
